[platformio]
default_envs = esp32_c3_bridge

[env:esp32_c3_bridge]
platform = espressif32@6.10.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
    -D CC1352_BRIDGE_HOST_BAUD=1000000
lib_deps =
    olikraus/U8g2
